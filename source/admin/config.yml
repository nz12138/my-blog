backend:
  name: github
  repo: 你的GitHub用户名/你的仓库名 # 这里换成你的实际仓库，例如: user/repo
  branch: main # 你的主分支名称，通常是 main 或 master
  # 注意：由于使用的是 Cloudflare Pages，这里需要配置 OAuth 代理（见第三步）
  base_url: https://noisy-glade-67f3.1766656358.workers.dev

# Hexo 的图片存放路径设置
media_folder: "source/images" # 上传图片的保存位置
public_folder: "/images"      # 文章中引用图片的路径

collections:
  - name: "posts"
    label: "文章 (Posts)"
    folder: "source/_posts"   # Hexo 存放文章的目录
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - {label: "标题 (Title)", name: "title", widget: "string"}
      - {label: "发布日期 (Date)", name: "date", widget: "datetime"}
      - {label: "标签 (Tags)", name: "tags", widget: "list", required: false}
      - {label: "正文 (Body)", name: "body", widget: "markdown"}