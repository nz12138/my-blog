# 4. 近期动态 (仿照截图中 Timeline 设计，适配玻璃质感)
# 4. 近期动态 (智能抓取 + 拒绝大框包小框版)
mete0r_timeline:
  layout: markdown
  content: |
    <style>
    /* 1. 彻底移除组件自带的背景、阴影和边距，防止大框包小框 */
    #mete0r_timeline { 
      background: transparent !important; 
      box-shadow: none !important; 
      padding: 0 !important; 
    }
    
    .timeline-wrapper {
      padding: 10px 5px;
    }
    
    .timeline-title {
      font-size: 14px;
      color: var(--text-p3);
      margin-bottom: 20px;
      font-weight: bold;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* 2. 这里的布局不再使用背景框，而是使用经典时间轴线 */
    .timeline-container {
      position: relative;
      padding-left: 20px;
      margin-left: 10px;
      border-left: 2px solid rgba(120, 120, 120, 0.2); /* 贯穿全剧的时间轴线 */
    }

    .timeline-item {
      position: relative;
      margin-bottom: 25px;
    }

    /* 时间轴上的圆点 */
    .timeline-item::before {
      content: '';
      position: absolute;
      left: -27px;
      top: 5px;
      width: 12px;
      height: 12px;
      background: var(--card); /* 随主题变色 */
      border: 2px solid #60a5fa;
      border-radius: 50%;
      z-index: 2;
    }

    .timeline-date-label {
      font-size: 13px;
      font-weight: bold;
      color: var(--text-p1);
      margin-bottom: 4px;
    }

    .timeline-time-label {
      font-size: 11px;
      color: var(--text-p3);
      margin-bottom: 8px;
    }

    /* 动态内容：不加背景，直接印在玻璃上 */
    .timeline-inner-content {
      font-size: 14px;
      color: var(--text-p1);
      line-height: 1.6;
      word-wrap: break-word;
    }

    .timeline-inner-content img {
      border-radius: 12px;
      margin-top: 10px;
      max-width: 100%;
      border: 1px solid rgba(255,255,255,0.1);
    }

    .timeline-footer-link {
      display: block;
      text-align: right;
      font-size: 12px;
      color: #60a5fa;
      text-decoration: none;
      margin-top: 8px;
      transition: 0.3s;
    }
    .timeline-footer-link:hover { color: #93c5fd; }
    </style>

    <div class="timeline-wrapper">
      <div class="timeline-title"><i class="fa-solid fa-bolt-lightning"></i> 近期动态</div>
      
      <div id="dynamic-timeline-box" class="timeline-container">
        <!-- JS 自动填充内容 -->
        <div style="font-size: 13px; color: var(--text-p3);">正在同步信号...</div>
      </div>
    </div>

    <script>
      // 路径已指向你新建的 /api/ 文件夹
      fetch('/api/timeline.json?t=' + new Date().getTime())
        .then(res => res.json())
        .then(data => {
          const box = document.getElementById('dynamic-timeline-box');
          let htmlStr = '';
          
          // 渲染前 3 条最新动态
          data.slice(0, 3).forEach(item => {
            let imageHtml = '';
            if (item.image) {
              imageHtml = `<img src="${item.image}" alt="动态配图" style="max-height: 120px; object-fit: cover;">`;
            }
            htmlStr += `
              <div class="timeline-item">
                <div class="timeline-date-label">${item.date}</div>
                <div class="timeline-time-label">${item.time}</div>
                <div class="timeline-inner-content">${item.content}${imageHtml}</div>
                <a href="/speak/#comments" class="timeline-footer-link">发布评论 →</a>
              </div>
            `;
          });
          
          box.innerHTML = htmlStr;
        })
        .catch(err => {
          document.getElementById('dynamic-timeline-box').innerHTML = '暂无信号';
        });
    </script>