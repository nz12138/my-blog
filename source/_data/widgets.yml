mete0r_welcome:
  layout: markdown
  content: |
    <style>
    .fog-ip { filter: blur(4px); opacity: 0.8; transition: all 0.4s ease; cursor: pointer; user-select: none; }
    .fog-ip:hover { filter: blur(0); opacity: 1; user-select: auto; }
    </style>
    <p style="margin: 0 0 8px 0; font-size: 14px; color: var(--text-p1);">欢迎 <span id="welcome-location" style="color: #f472b6; font-weight: bold;">地球</span> 的小伙伴</p>
    <p style="margin: 0 0 8px 0; font-size: 14px; color: var(--text-p1);">您的IP：<span id="welcome-ip" class="fog-ip" style="color: #fff; background: #fbbf24; padding: 2px 8px; border-radius: 8px; font-family: monospace;">正在侦测...</span></p>
    <p style="margin: 0 0 8px 0; font-size: 14px; color: #7dd3fc; font-weight: bold;">祝你找到属于自己的频率</p>
    <p style="margin: 0 0 8px 0; font-size: 14px;"><a href="/about/" style="color: #86efac; border-bottom: 1px solid #86efac; text-decoration: none;">我的个人主页</a></p>
    <hr style="border: 0; border-top: 1px solid rgba(0,0,0,0.1); margin: 12px 0;">
    <p style="font-size: 13px; color: var(--text-p3); margin: 0; line-height: 1.6;">若访问速度异常,请点击左下角邮件反馈</p>
    
    <script>
    async function fetchIpInfo() {
      const elIp = document.getElementById('welcome-ip');
      const elLoc = document.getElementById('welcome-location');

      try {
        // 第一优先级：使用 ip.useragentinfo.com 接口，对国内移动端适配较好
        const response = await fetch('https://ip.useragentinfo.com/json');
        if (!response.ok) throw new Error('Primary API failed');
        const res = await response.json();
        
        if (res.code === 200) {
          elIp.innerText = res.ip || '未知 IP';
          // 优先显示省市，如果移动端只能定位到省，则只显示省
          const prov = res.province || '';
          const city = (res.city && res.city !== prov) ? res.city : '';
          elLoc.innerText = prov + city;
        } else {
          throw new Error('Primary API Invalid Data');
        }
      } catch (err) {
        try {
          // 第二优先级：百度云接口作为备选
          const response = await fetch('https://qifu-api.baidubce.com/ip/local/geo/v1/city');
          const res = await response.json();
          if (res.code === 'Success' && res.data) {
            elIp.innerText = res.data.ip || '未知 IP';
            elLoc.innerText = (res.data.prov || '') + (res.data.city || '');
          } else {
            throw new Error('Secondary API failed');
          }
        } catch (fallbackErr) {
          // 如果国内接口都失败，尝试 ipapi.co (国外访问或科学上网环境)
          try {
            const fallbackRes = await fetch('https://ipapi.co/json/');
            const fallbackData = await fallbackRes.json();
            elIp.innerText = fallbackData.ip || '未知 IP';
            const country = fallbackData.country_name === 'China' ? '' : (fallbackData.country_name || '');
            elLoc.innerText = `${country} ${fallbackData.region || ''} ${fallbackData.city || ''}`.trim();
          } catch (lastErr) {
            if (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1') {
              elIp.innerText = '127.0.0.1';
              elLoc.innerText = '本地测试环境';
            } else {
              elIp.innerText = '获取失败';
              elLoc.innerText = '未知空间';
            }
          }
        }
      }
    }
    setTimeout(fetchIpInfo, 500);
    </script>

