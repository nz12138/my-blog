    <script>
      (function() {
        const initTheme = () => {
          const toggle = document.getElementById('theme-toggle');
          if (!toggle) return;
          const htmlEl = document.documentElement;
          const stored = localStorage.getItem('Stellar.theme');
          const current = htmlEl.getAttribute('data-theme') || stored || 'auto';
          const isDark = current === 'dark' || (current === 'auto' && window.matchMedia("(prefers-color-scheme: dark)").matches);
          toggle.checked = isDark;
          
          toggle.addEventListener('change', function() {
            const theme = this.checked ? 'dark' : 'light';
            htmlEl.setAttribute('data-theme', theme);
            localStorage.setItem('Stellar.theme', theme);
            if (typeof utils !== 'undefined' && utils.dark) {
              utils.dark.mode = theme;
              if (utils.dark.method && utils.dark.method.toggle) {
                utils.dark.method.toggle.start();
              }
            }
          });
        };
        initTheme();
        document.addEventListener('pjax:complete', initTheme);
      })();
    </script>

