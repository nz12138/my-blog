######## Main ########
site_tree:
  home:
    leftbar: mete0r_welcome, recent, mete0r_footer 
    rightbar: mete0r_author, mete0r_timeline
    nav_tabs:
      '近期发布': /
      '分类': /categories/
      '标签': /tags/
      '归档': /archives/

  index_blog:
    base_dir: blog
    menu_id: post
    leftbar: mete0r_welcome, recent, mete0r_footer
    rightbar: mete0r_author,mete0r_timeline
    nav_tabs:

  index_topic:
    base_dir: topic 
    menu_id: post 
  index_wiki:
    base_dir: wiki 
    menu_id: wiki 
    leftbar: related, recent, mete0r_footer 
    rightbar:
    nav_tabs:
  post:
    menu_id: post 
    leftbar: related, recent, mete0r_footer 
    rightbar: ghrepo, toc
  topic:
    menu_id: post
    leftbar: recent, mete0r_footer
  wiki:
    menu_id: wiki 
    leftbar: tree, related, recent, mete0r_footer 
    rightbar: ghrepo, toc
  notebooks:
    base_dir: notebooks 
    menu_id: notebooks 
    leftbar: recent, mete0r_footer 
    rightbar: null
  notes:
    menu_id: notebooks
    leftbar: tagtree, recent, mete0r_footer 
    rightbar: null
  note:
    leftbar: tagtree, recent, mete0r_footer 
    rightbar: toc
  author:
    base_dir: author 
    menu_id: post
    leftbar: recent, timeline, mete0r_footer
    rightbar: timeline
  error_page:
    menu_id: post
    '404': '/404.html'
    leftbar: recent, timeline, mete0r_footer
    rightbar: timeline
  page:
    leftbar: recent, mete0r_footer
    rightbar: toc


######## Notebook ########
notebook:
  auto_excerpt: 128
  tagcons:
    '': solar:hashtag-square-bold
  per_page: null
  order_by: -updated
  license: false
  share: false


######## Article ########
article:
  type: tech 
  indent: 
  cover_ratio: 2
  banner_ratio: 2.5
  auto_banner: false 
  auto_excerpt: 128
  category_color:
    '探索号': '#f44336'
  license: '本文采用 [CC BY-NC-SA 4.0](https://creativecommons.org/licenses/by-nc-sa/4.0/) 许可协议。'
  share: 
  related_posts:
    enable: false
    max_count: 5

search:
  service: local_search 
  local_search: 
    field: all 
    path: /search.json 
    content: true 
    skip_search:  
  algolia_search: 
    appId:
    apiKey:
    indexName:
    js: https://gcore.jsdelivr.net/algoliasearch/3/algoliasearch.min.js


######## Comments ########
comments:
  service: twikoo
  comment_title: 快来参与讨论吧~
  lazyload: false


  custom_css: 
  beaudar:
    repo: xxx/xxx
    issue-term: pathname
    issue-number:
    theme: preferred-color-scheme
    label:
    input-position: top 
    comment-order: desc 
    keep-theme: 
    loading: false
    branch: main
  utterances:
    repo: xxx/xxx
    issue-term: pathname
    issue-number:
    theme: preferred-color-scheme
    label:
  giscus:
    src: https://giscus.app/client.js
    data-repo: xxx/xxx 
    data-repo-id: 
    data-category: 
    data-category-id:
    data-mapping: pathname
    data-strict: 0
    data-reactions-enabled: 1
    data-emit-metadata: 0
    data-input-position: top 
    data-theme: preferred_color_scheme
    data-lang: zh-CN
    data-loading: 
    crossorigin: anonymous

  twikoo:
    js: https://gcore.jsdelivr.net/npm/twikoo@1.6/dist/twikoo.all.min.js
    envId: 'https://twikoo.hz-artalk.abrdns.com/.netlify/functions/twikoo'

  waline:
    js: https://gcore.jsdelivr.net/npm/@waline/client@3.1/dist/waline.js
    css: https://gcore.jsdelivr.net/npm/@waline/client@3.1/dist/waline.css
    meta_css: https://gcore.jsdelivr.net/npm/@waline/client@3.1/dist/waline-meta.css
    serverURL: https://waline.vercel.app
    commentCount: true
    pageview: false


######## Footer ########
footer:
  social:
  sitemap:
  content: |
    <div style="width: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center;">
      <p style="margin: 4px 0;">Copyright &copy; 2026 HZ Lab</p>
      <p style="margin: 4px 0;">本站已平稳运行：<span id="site_runtime" style="color: #1BCDFC; font-weight: bold;">载入中...</span></p>
      <p style="margin: 4px 0;">累计访问人次：</p>
      <img src="https://count.getloli.com/get/@hzlab_counter?theme=rule34&padding=7&offset=0" alt="Moe-Counter" style="display: block; margin: 8px auto 0;">
    </div>
    <script>
      function show_runtime() {
        var start_date = new Date("04/07/2026 15:30:00"); 
        var now_date = new Date();
        var time_diff = now_date.getTime() - start_date.getTime();
        var d = Math.floor(time_diff / (24 * 3600 * 1000));
        var h = Math.floor((time_diff % (24 * 3600 * 1000)) / (3600 * 1000));
        var m = Math.floor((time_diff % (3600 * 1000)) / (60 * 1000));
        var s = Math.floor((time_diff % (60 * 1000)) / 1000);
        document.getElementById("site_runtime").innerHTML = d + " 天 " + h + " 小时 " + m + " 分 " + s + " 秒";
        setTimeout(show_runtime, 1000); // 改进了定时器写法，更稳定
      }
      show_runtime();
    </script>

######## Tag Plugins ########
tag_plugins:
  note:
    default_color: '' 
    border: true 
  checkbox:
    interactive: false 
  quot:
    default: 
      prefix: bxs:quote-left
      suffix: bxs:quote-right
    hashtag:
      prefix: solar:hashtag-square-bold
    question:
      prefix: ph:seal-question-fill
  emoji:
    default: https://gcore.jsdelivr.net/gh/cdn-x/emoticons@3.1/qq/{name}.gif
    twemoji: https://gcore.jsdelivr.net/gh/twitter/twemoji/assets/svg/{name}.svg
    qq: https://gcore.jsdelivr.net/gh/cdn-x/emoticons@3.1/qq/{name}.gif
    aru: https://gcore.jsdelivr.net/gh/cdn-x/emoticons@3.1/aru/{name}.gif
    tieba: https://gcore.jsdelivr.net/gh/cdn-x/emoticons@3.1/tieba/{name}.png
    blobcat: https://gcore.jsdelivr.net/gh/cdn-x/emoticons@3.1/blobcat/{name}.gif
  icon:
    default_color: accent 
  button:
    default_color: theme 
  image:
    fancybox: false 
  copy:
    toast: 复制成功
  timeline:
    max-height: 80vh
  mark:
    default_color: yellow 
  hashtag:
    default_color: 
  okr:
    border: true 
    status: 
      in_track:
        color: blue 
        label: 正常
      at_risk:
        color: yellow
        label: 风险
      off_track:
        color: orange
        label: 延期
      finished:
        color: green
        label: 已完成
      unfinished:
        color: red
        label: 未完成
  gallery:
    layout: grid 
    size: mix 
    ratio: square 
  chat:
